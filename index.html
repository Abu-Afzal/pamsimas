<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PAMSIMAS</title>
    <!-- Bootstrap 5 CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-primary">PAMSIMAS</h3>
                            <p class="text-muted small">Sistem Administrasi Air Bersih</p>
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Username / No. Meter</label>
                                <input type="text" id="inputUsername" class="form-control" placeholder="Masukkan username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Password</label>
                                <input type="password" id="inputPassword" class="form-control" placeholder="Masukkan password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-semibold">Masuk</button>
                        </form>

                        <div id="loginError" class="alert alert-danger mt-3 d-none small"></div>

                        <hr>
                        <div class="text-center text-muted small">
                            <p class="mb-0">Demo Akun:</p>
                            <p class="mb-0">Admin: admin / admin123</p>
                            <p class="mb-0">Petugas: petugas / petugas123</p>
                            <p class="mb-0">Pelanggan: 1001 / budi123</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
